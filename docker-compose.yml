services:

  api:
    build: .
    container_name: ai-services-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - ENV=production
      - QDRANT_URL=http://qdrant:6333
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - qdrant
      - redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


  qdrant:
    image: qdrant/qdrant
    container_name: ai-services-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/collections || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


  redis:
    image: redis:7
    container_name: ai-services-redis
    ports:
      - "6379:6379"
    restart: always


volumes:
  qdrant_storage:
