services:

  api:
    build: .
    container_name: ai-services-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_NAME: qwen/qwen3-next-80b-a3b-instruct
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: ai-services-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
