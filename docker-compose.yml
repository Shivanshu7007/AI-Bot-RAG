services:

  api:
    build: .
    container_name: ai-services-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_NAME: qwen/qwen3-next-80b-a3b-instruct
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Explicit DNS so the container can resolve external hostnames (e.g. Qdrant Cloud)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ai-services-redis
    ports:
      - "127.0.0.1:6379:6379"
    # noeviction: Sidekiq requires keys are never silently dropped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
